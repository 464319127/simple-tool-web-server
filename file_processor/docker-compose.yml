services:
  app:
    build:
      context: .
    environment:
      DUCC_BASE_URL: ${DUCC_BASE_URL:-https://oneapi-comate.baidu-int.com/v1/messages}
      PDF2ZH_LANG_IN: ${PDF2ZH_LANG_IN:-en}
      PDF2ZH_LANG_OUT: ${PDF2ZH_LANG_OUT:-zh}
      PDF2ZH_THREADS: ${PDF2ZH_THREADS:-10}
      PDF2ZH_TIMEOUT_SECONDS: ${PDF2ZH_TIMEOUT_SECONDS:-3600}
    security_opt:
      - seccomp=unconfined
    volumes:
      - uploads:/data/uploads
      - results:/data/results
    expose:
      - "8000"

  nginx:
    image: docker.1ms.run/library/nginx:alpine-perl
    ports:
      - "${WEB_PORT:-8999}:8999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  uploads:
  results:
